service:
  name: service-llm
  namespace: aicares
image:
  repository: 952893849914.dkr.ecr.us-east-1.amazonaws.com/aicares-application/llm
  tag: latest
  pullPolicy: Always
containerPort: 8000
resources:
  limits:
    memory: "500Mi"
  requests:
    memory: "128Mi"
    cpu: "100m"
env:
  - name: LLM_PORT
    value: "8000"
  - name: FLAGD_HOST
    value: "flagd"
  - name: FLAGD_PORT
    value: "8013"
  - name: OTEL_SERVICE_NAME
    value: "llm"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector:4317"
nodeSelector:
  eks.amazonaws.com/nodegroup: graviton-workers
